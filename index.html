    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utility: Enhanced Code Processing ---
        const enhanceCodeBlocks = (container) => {
            if (!container) return;
            const preBlocks = container.querySelectorAll('pre');
            preBlocks.forEach(pre => {
                if (pre.parentElement.classList.contains('terminal-container')) return;

                const code = pre.querySelector('code');
                const langMatch = code ? code.className.match(/language-(\w+)/) : null;
                const lang = langMatch ? langMatch[1] : 'code';

                // Create Frame
                const wrapper = document.createElement('div');
                wrapper.className = 'terminal-container relative';

                const header = document.createElement('div');
                header.className = 'terminal-header';
                header.innerHTML = `
                    <div class="terminal-dots">
                        <div class="dot dot-red"></div>
                        <div class="dot dot-yellow"></div>
                        <div class="dot dot-green"></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="code-lang">${lang}</span>
                    </div>
                `;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn-inner';
                copyBtn.innerHTML = `<span>COPY</span>`;
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(code.innerText);
                    copyBtn.innerHTML = '<span>COPIED!</span>';
                    setTimeout(() => copyBtn.innerHTML = '<span>COPY</span>', 2000);
                };

                const controls = header.querySelector('.flex');
                controls.appendChild(copyBtn);

                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
        };

        // --- Utility: Typewriter Component ---
        const TypewriterText = ({ text }) => {
            const [display, setDisplay] = useState('');
            useEffect(() => {
                let current = 0;
                setDisplay('');
                const timer = setInterval(() => {
                    if (current < text.length) {
                        setDisplay(text.slice(0, current + 1));
                        current++;
                    } else {
                        clearInterval(timer);
                    }
                }, 80);
                return () => clearInterval(timer);
            }, [text]);
            return (
                <span>
                    {display}
                    <span className="cursor-blink"></span>
                </span>
            );
        };

        // --- Utility: Copy Button Component ---
        const CopyButton = ({ text, label }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button
                    onClick={handleCopy}
                    className="px-6 py-3 border border-accent/20 text-accent hover:border-accent rounded-full font-bold text-[10px] uppercase tracking-widest relative transition-all"
                >
                    {copied ? '✓ Copied!' : label}
                </button>
            );
        };

        // --- Utility: Scroll Reveal Wrapper ---
        const ScrollReveal = ({ children }) => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    },
                    { threshold: 0.05 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className="reveal">{children}</div>;
        };

                                    className="group cursor-pointer p-6 border border-divider rounded-2xl hover:border-copper transition-all text-right"
                                >
                                    <span className="text-[9px] font-mono font-bold uppercase tracking-[0.3em] text-accent/20 group-hover:text-copper mb-2 block">Next Moment →</span>
                                    <h4 className="font-serif italic text-lg leading-tight">{nextMoment.title}</h4>
                                </div>
                            )}
                        </nav>
                    </article>
                );
            }

            return (
                <section className="py-12 md:py-20 reveal max-w-3xl" aria-label="Life and Fragments">
                    <h2 className="text-4xl md:text-6xl font-serif font-bold italic mb-12 md:mb-16">Life & Fragments</h2>
                    {loading && <div className="text-subtle animate-pulse font-mono tracking-widest uppercase text-[10px]">Loading Moments...</div>}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {moments.map((item, idx) => (
                            <article
                                key={idx}
                                className="group p-8 border-l-4 border-copper/20 bg-hover-bg/30 rounded-r-3xl transition-all hover:bg-hover-bg/50 cursor-pointer"
                                onClick={() => readMoment(item.filename)}
                            >
                                <div className="flex justify-between items-start mb-4">
                                    <span className="text-[9px] font-mono font-bold uppercase tracking-widest text-copper/60"># {item.tags?.[0] || 'Life'}</span>
                                    <span className="text-[9px] font-mono font-bold opacity-30 uppercase tracking-widest">{item.date}</span>
                                </div>
                                <h3 className="text-xl font-serif font-bold mb-4 group-hover:text-copper transition-colors">{item.title}</h3>
                                <p className="text-sm text-subtle font-normal line-clamp-2 mb-6">{item.summary}</p>
                                <div className="text-[9px] font-mono font-bold uppercase tracking-[0.4em] text-accent/20 group-hover:text-copper transition-colors">
                                    / View Moment ->
                                </div>
                            </article>
                        ))}
                    </div>
                </section>
            );
        };

        const Services = () => (
            <section className="py-12 md:py-24 reveal max-w-5xl mx-auto" aria-label="Services and Contact">
                {/* Main Author & Services Glass Card */}
                <div className="bg-white/40 backdrop-blur-xl border border-white/40 rounded-[3rem] p-8 md:p-16 shadow-glass relative overflow-hidden">
                    {/* Subtle Mesh Background Overlay */}
                    <div className="absolute top-0 right-0 w-96 h-96 bg-mesh opacity-30 blur-3xl -z-10 rotate-12"></div>

                    {/* Identification Badge */}
                    <div className="flex items-center gap-3 mb-10">
                        <span className="w-2 h-2 bg-copper rounded-full animate-pulse"></span>
                        <span className="text-xs font-mono font-bold uppercase tracking-[0.4em] text-copper">
                            Author Identification & Services
                        </span>
                    </div>

                    {/* Section 1: Author Info */}
                    <div className="flex flex-col md:flex-row items-center md:items-start gap-12 mb-16 border-b border-white/40 pb-16">
                        <div className="w-32 h-32 shrink-0 rounded-[2.5rem] bg-white/60 flex items-center justify-center shadow-glass transform hover:scale-105 transition-all duration-700 overflow-hidden">
                            <img src="assets/IMG_5334.JPG" alt="Liwen Chiou" className="w-full h-full object-cover" />
                        </div>
                        <div className="flex-1 text-center md:text-left">
                            <h2 className="font-serif text-5xl md:text-6xl font-bold text-slate-ink mb-4 italic leading-tight">Liwen Chiou</h2>
                            <p className="font-mono text-sm text-accent/60 mb-6 font-bold tracking-widest uppercase">
                                Full-Stack Engineer & System Architect
                            </p>
                            <p className="font-sans text-lg md:text-xl text-subtle leading-relaxed mb-8 max-w-2xl">
                                正在尋找能將抽象點子轉化為具體產品的技術夥伴嗎？無論是打造全新的數位服務、解決棘手的系統效能瓶頸，或是希望在現有流程中導入 AI 應用，我都準備好為您的專案注入全新動能。目前開放技術諮詢與專案合作，讓我們聊聊您的下一個好點子。
                            </p>
                            <div className="flex flex-wrap justify-center md:justify-start gap-4">
                                <a href="mailto:aa771117@gmail.com" className="px-6 py-3 bg-accent text-white rounded-full font-bold text-[10px] uppercase tracking-widest shadow-lg hover:-translate-y-1 transition-transform">
                                    Start a Conversation
                                </a>
                                <a href="https://github.com/liwenchiou" target="_blank" className="px-6 py-3 border border-accent/20 text-accent hover:border-accent rounded-full font-bold text-[10px] uppercase tracking-widest hover:-translate-y-1 transition-transform">
                                    Review GitHub
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Utility Status */}
                    <div className="mt-16 pt-8 border-t border-white/20 flex flex-wrap gap-8 font-mono text-[9px] uppercase tracking-widest text-accent/40 justify-center md:justify-start">
                        <span>● Location: Taiwan</span>
                        <span>● Availability: Q2 {new Date().getFullYear()}</span>
                        <span>● Expertise: PHP / React / AI</span>
                    </div>
                </div>
            </section>
        );

        // --- Main App ---
        const App = () => {
            const [activeItem, setActiveItem] = useState(() => {
                const hash = window.location.hash.replace('#', '');
                return ['intro', 'portfolio', 'tech', 'life', 'services'].includes(hash) ? hash : 'intro';
            });
            const [sectionKey, setSectionKey] = useState(0); // For forcing component reset
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [loadProgress, setLoadProgress] = useState(0);
            const mainRef = useRef(null);

            const handleNavItemClick = (id) => {
                if (id === activeItem) {
                    setSectionKey(prev => prev + 1); // Force reset if same item
                } else {
                    setActiveItem(id);
                    setSectionKey(0); // Reset for new item
                }
            };

            useEffect(() => {
                window.location.hash = activeItem;
                if (mainRef.current) {
                    mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }

                setLoadProgress(30);
                const timer = setTimeout(() => setLoadProgress(100), 400);
                const cleanupTimer = setTimeout(() => setLoadProgress(0), 1000);
                return () => {
                    clearTimeout(timer);
                    clearTimeout(cleanupTimer);
                };
            }, [activeItem, sectionKey]);

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '');
                    if (['intro', 'portfolio', 'tech', 'life', 'services'].includes(hash)) {
                        setActiveItem(hash);
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);


            return (
                <div className="flex flex-col md:flex-row h-screen w-full relative">
                    {/* Suggestion 3: Loading Bar */}
                    <div
                        className="loading-bar shadow-glow"
                        style={{ width: `${loadProgress}%`, opacity: loadProgress > 0 ? 1 : 0 }}
                    />

                    {/* Mobile Top Bar */}
                    <div className="md:hidden flex items-center justify-between p-6 bg-white border-b border-divider z-40 sticky top-0">
                        <div className="text-xl font-serif font-bold italic">Liwen Chiou</div>
                        <button onClick={() => setIsSidebarOpen(true)} className="text-2xl">☰</button>
                    </div>

                    <Sidebar
                        activeItem={activeItem}
                        setActiveItem={handleNavItemClick}
                        isOpen={isSidebarOpen}
                        setIsOpen={setIsSidebarOpen}
                    />

                    <main
                        ref={mainRef}
                        className="flex-1 overflow-y-auto px-8 md:px-24 bg-soft-bg scroll-smooth selection:bg-copper/10 selection:text-copper"
                    >
                        <div className="reveal visible">
                            {activeItem === 'intro' && <Introduction key={`intro-${sectionKey}`} />}
                            {activeItem === 'portfolio' && <Portfolio key={`portfolio-${sectionKey}`} />}
                            {activeItem === 'tech' && <TechArticles key={`tech-${sectionKey}`} />}
                            {activeItem === 'life' && <LifeSharing key={`life-${sectionKey}`} />}
                            {activeItem === 'services' && <Services key={`services-${sectionKey}`} />}
                        </div>

                        {/* Static Footer inside scroll area */}
                        <div className="py-12 md:py-20 opacity-30 text-[9px] md:text-[10px] font-bold tracking-[0.3em] uppercase border-t border-divider text-center md:text-left">
                            © {new Date().getFullYear()} Liwen Chiou. Built with Meaning.
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Static SEO Content for Crawlers (Invisible to Users) -->
    <nav class="sr-only" style="display: none;">
        <a href="#intro">Liwen Chiou Introduction - Digital Architect</a>
        <a href="#portfolio">Selected Portfolio - Full-Stack Projects</a>
        <a href="#tech">Technical Insights - React, AI, PHP Articles</a>
        <a href="#life">Life & Fragments - Zen and Minimalism</a>
        <a href="#services">Architecture Services & Collaboration</a>
    </nav>
</body>
